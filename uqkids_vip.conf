# 小小优趣 VIP 共享 Token — Quantumult X 配置片段
# 将以下各节内容合并到你的 quantumult.conf 对应位置

[rewrite_local]
# ① 用户信息接口响应修改（宽泛规则便于调试）
^https?://[^/]*\.ukids\.cn/ url script-response-body https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_vip.js
^https?://[^/]*\.ukidsonline\.cn/ url script-response-body https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_vip.js

# ② play 接口请求时替换 VIP token（服务端返回完整内容URL，非试听URL）
^https?://[^/]*\.ukids\.cn/coreapp/play/ url script-request-header https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_token.js
^https?://[^/]*\.ukidsonline\.cn/coreapp/play/ url script-request-header https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_token.js

[mitm]
hostname = *.ukids.cn, *.ukidsonline.cn
