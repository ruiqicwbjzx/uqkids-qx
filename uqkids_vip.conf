# 小小优趣 VIP 共享 Token — Quantumult X 配置片段
# 将以下各节内容合并到你的 quantumult.conf 对应位置

[rewrite_local]
# ① 用户信息接口响应修改：vip=1 / vipEnd=2099-12-31（不依赖外部token）
^https?://[^/]*\.ukids\.cn/ucapp/getUser url script-response-body https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_vip.js
^https?://[^/]*\.ukids\.cn/ucapp/getUserSVip url script-response-body https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_vip.js
^https?://[^/]*\.ukids\.cn/coreapp/growth/user/attr url script-response-body https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_vip.js
^https?://[^/]*\.ukids\.cn/uch5/getUser url script-response-body https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_vip.js
^https?://[^/]*\.ukidsonline\.cn/ucapp/getUser url script-response-body https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_vip.js
^https?://[^/]*\.ukidsonline\.cn/ucapp/getUserSVip url script-response-body https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_vip.js

# ② play 接口响应修改：previewDur=0 / preview=0 / paid=1
^https?://[^/]*\.ukids\.cn/coreapp/play/ url script-response-body https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_play.js
^https?://[^/]*\.ukidsonline\.cn/coreapp/play/ url script-response-body https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_play.js

[mitm]
hostname = *.ukids.cn, *.ukidsonline.cn
