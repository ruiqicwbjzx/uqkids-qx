# 小小优趣 VIP 共享 Token — Quantumult X 配置片段
# 将以下各节内容合并到你的 quantumult.conf 对应位置

[rewrite_local]
# 拦截所有发往 ukids 相关域名的请求，替换 token header
^https?://fastapi\.ukids\.cn/ url script-request-header uqkids_vip.js
^https?://fastapi\.ukidsonline\.cn/ url script-request-header uqkids_vip.js
^https?://prod\.ukids\.cn/ url script-request-header uqkids_vip.js

[mitm]
hostname = fastapi.ukids.cn, fastapi.ukidsonline.cn, prod.ukids.cn
