# 小小优趣 VIP 共享 Token — Quantumult X 配置片段
# 将以下各节内容合并到你的 quantumult.conf 对应位置

[rewrite_local]
# 仅在用户信息接口替换 token，其余接口不受影响
^https?://[^/]*\.ukids\.cn/ucapp/getUser url script-request-header https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_vip.js
^https?://[^/]*\.ukids\.cn/ucapp/getUserSVip url script-request-header https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_vip.js
^https?://[^/]*\.ukids\.cn/coreapp/growth/user/attr url script-request-header https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_vip.js
^https?://[^/]*\.ukids\.cn/uch5/getUser url script-request-header https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_vip.js
^https?://[^/]*\.ukidsonline\.cn/ucapp/getUser url script-request-header https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_vip.js
^https?://[^/]*\.ukidsonline\.cn/ucapp/getUserSVip url script-request-header https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_vip.js
^https?://[^/]*\.ukidsonline\.cn/coreapp/growth/user/attr url script-request-header https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_vip.js

[mitm]
hostname = *.ukids.cn, *.ukidsonline.cn
