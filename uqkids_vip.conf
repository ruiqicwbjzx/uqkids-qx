# 小小优趣 VIP 共享 Token — Quantumult X 配置片段
# 将以下各节内容合并到你的 quantumult.conf 对应位置

[rewrite_local]
# 覆盖所有 *.ukids.cn / *.ukidsonline.cn 请求，脚本内部排除登录等路径
^https?://[^/]*\.ukids\.cn/ url script-request-header https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_vip.js
^https?://[^/]*\.ukidsonline\.cn/ url script-request-header https://raw.githubusercontent.com/ruiqicwbjzx/uqkids-qx/main/uqkids_vip.js

[mitm]
hostname = *.ukids.cn, *.ukidsonline.cn
